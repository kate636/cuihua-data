# FM Query API nginx 反代片段
#
# 安装方式（不改动现有 /reports/ 配置，只追加 location /api/）：
#   1. 找到现有监听 8080 的 server block（通常在 /etc/nginx/conf.d/ 或 /etc/nginx/sites-enabled/）
#   2. 把下面整块 location /api/ 追加进去
#   3. sudo nginx -t && sudo systemctl reload nginx
#
# 对应的后端服务：uvicorn 监听 127.0.0.1:5003（systemd 单元 fm-query-api.service）

location /api/ {
    proxy_pass http://127.0.0.1:5003;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Bearer Token 透传
    proxy_pass_request_headers on;

    # 查询长尾给 120 秒，配合 FastAPI 内部 60s 超时
    proxy_connect_timeout 10s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # 大结果集响应不缓冲，直接流式回客户端
    proxy_buffering off;
}
